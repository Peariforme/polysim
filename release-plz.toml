[workspace]
# GitHub releases are disabled at workspace level; enabled per publishable package below.
git_release_enable = false

[[package]]
name = "polysim-core"
# Enable GitHub release creation and CHANGELOG updates for this crate.
git_release_enable = true
changelog_update = true

[[package]]
name = "polysim-cli"
# polysim-cli has publish = false in Cargo.toml, so release-plz will skip
# `cargo publish` but still create git tags and GitHub releases.
# The tag format (polysim-cli-v*) triggers dist.yml to build platform binaries.
git_release_enable = true
changelog_update = true
